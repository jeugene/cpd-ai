

[app]
awsEnv = dev
awsRegion = us-east-1
awsAccount = 1234567890

appCode = cpd

iamLambdaRole =
iamGlueRole =
kmsAlias = ${appCode}/${awsEnv}/data

s3Data = s3://${appCode}-data-${awsEnv}-${awsRegion}-${awsAccount}

sqsDataNotify =
sqsDWH_DQ =
sqsData =
sqsData_SQ =

[spark]
# Runtime environment. Options: local, emr, glue  (default: local)
mode = local

# S3 warehouse path for emr and glue modes.
# Leave blank to auto-derive as {s3Data}/warehouse from the [app] section.
# warehouse_s3 =

# Iceberg catalog name — must match spark.sql.catalog.<name> configured in spark_utils
catalog = local

# Iceberg namespace (database)
namespace = ${app:appCode}

# Iceberg table names
credit_cards = credit_cards
credit_transactions = credit_transactions

# Source data path — relative to project root for local, full S3 URI for emr/glue
cards = src/main/resources/credit_cards.json
transactions = src/main/resources/credit_transactions.json
# Merge key used for SQS → S3 Iceberg upserts
merge_key = card_id

[agents]
# LLM provider for the cards agent. Options: anthropic, openai, copilot, bedrock
provider = anthropic

# Optional model overrides — omit to use each provider's default
# anthropic_model = claude-sonnet-4-6
# openai_model    = gpt-4o
# copilot_model   = gpt-4o
# bedrock_model   = us.anthropic.claude-opus-4-8-20251101

# GitHub Copilot API key (can also be set via GITHUB_TOKEN env var)
# copilot_api_key =

[rag]
# Amazon S3 Vectors bucket for storing document embeddings
vector_bucket = ${app:appCode}-vectors-${app:awsEnv}-${app:awsRegion}-${app:awsAccount}

# Bedrock model IDs
embed_model = amazon.titan-embed-text-v2:0
gen_model   = us.anthropic.claude-opus-4-8-20251101

# Embedding dimensions — Titan v2 supports 256, 512, 1024
embed_dims = 1024

# Chunking parameters (characters)
chunk_size    = 500
chunk_overlap = 50

# Number of nearest neighbours to retrieve per query
top_k = 5
